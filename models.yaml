# Список моделей, доступных для выбора на странице «Настройки» (по задачам —
# скоринг и tailor отдельно). Это НЕ секреты, обычный справочник — можно
# смело редактировать и коммитить. Строка "model" — то, что реально уходит в
# modelUri (Yandex: gpt://<folder_id>/<model>) или в поле model запроса
# (GigaChat) — если добавляешь новую модель, бери точное имя из живого списка
# провайдера (кнопка «Показать список моделей» в Настройках, или напрямую:
# Yandex — GET https://ai.api.cloud.yandex.net/v1/models с заголовками
# Authorization: Api-Key <ключ> + x-folder-id: <folder_id>; GigaChat —
# client.get_models() из библиотеки gigachat), не с потолка и не по докам,
# которые могут отставать от реального каталога.

scoring:
  - provider: yandex
    model: "yandexgpt-lite/latest"
    label: "YandexGPT Lite (по умолчанию, дёшево)"
  - provider: yandex
    model: "yandexgpt/rc"
    label: "YandexGPT Pro 5.1 (release candidate)"
  - provider: yandex
    model: "aliceai-llm-flash/latest"
    label: "Alice AI LLM Flash"
  - provider: gigachat
    model: "GigaChat-2"
    label: "GigaChat-2 (экспериментально)"

tailor:
  - provider: yandex
    model: "yandexgpt/latest"
    label: "YandexGPT Pro (по умолчанию)"
  - provider: yandex
    model: "yandexgpt/rc"
    label: "YandexGPT Pro 5.1 (release candidate)"
  - provider: gigachat
    model: "GigaChat-2-Pro"
    label: "GigaChat-2-Pro (экспериментально)"
