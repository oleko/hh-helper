{% extends "base.html" %}
{% block title %}Вход — hh-helper{% endblock %}
{% block content %}
<h2>Вход</h2>
{% if error %}
<p class="flags">⚠ {{ error }}</p>
{% endif %}
<form method="post" style="max-width:20rem;">
  <p><input type="text" name="username" placeholder="Логин" autofocus autocomplete="username"
            style="width:100%; padding:0.5rem; box-sizing:border-box;"></p>
  <p><input type="password" name="password" placeholder="Пароль" autocomplete="current-password"
            style="width:100%; padding:0.5rem; box-sizing:border-box;"></p>
  <button type="submit">Войти</button>
</form>
{% endblock %}
