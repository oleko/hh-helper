# Конфигурация hh-helper — скопируй в config.yaml и настрой под себя:
#   cp config.example.yaml config.yaml
# Секретные ключи сюда НЕ вписывай — они в .env (см. .env.example).
# Все ID регионов/ролей можно уточнить командой:
#   python -m src.main dictionaries
# и свериться с components в openapi.yml (areas, professional_roles)

hh:
  # Заголовок обязателен по требованиям HH API: "Имя приложения/версия (email)".
  # HH использует этот email, чтобы связаться с тобой, если что-то не так с запросами.
  user_agent: "MyJobHelper/1.0 (your-email@example.com)"
  client_id_env: "HH_CLIENT_ID"
  client_secret_env: "HH_CLIENT_SECRET"

superjob:
  # Необязательный источник — убери всю секцию, если не нужен SuperJob вообще,
  # либо просто выключи его на странице «Настройки» в веб-интерфейсе.
  secret_key_env: "SUPERJOB_SECRET_KEY"
  # town (id города SuperJob) сюда не пишем — город теперь настраивается на
  # странице «Настройки» веб-интерфейса (задаёт id сразу и для HH, и для SuperJob).

search:
  # Каждая строка — отдельный запрос text=, результаты объединяются и дедуплицируются по id.
  # Замени на свои роли/должности.
  queries:
    - "python developer"
    - "backend engineer"
  # search_field: "name" ищет только в заголовке вакансии (меньше мусора).
  # Оставь пустым/убери поле, чтобы искать также в описании.
  search_field: "name"
  employment: null       # напр. "full" — если хочешь ограничить типом занятости
  schedule: null          # напр. "remote", "flexible" — если важен формат работы
  experience: null         # напр. "between3And6", "moreThan6" — см. /dictionaries
  currency: "RUR"
  only_with_salary: false    # true — резко сузит выборку, у многих вакансий ЗП скрыта
  period: 7                   # искать вакансии за последние N дней (при повторном fetch не
                                # страшно — дедуп по id)
  per_page: 50
  max_pages: 4                 # защита от случайного огромного выкачивания
  # Город (area), зарплатный порог (salary_from) и приоритетные линии метро сюда
  # не пишем — всё это теперь на странице «Настройки» веб-интерфейса: выбор
  # города из списка (без ручного поиска id), число для зарплаты, список линий
  # метро текстом. Дефолт для нового инстанса без сохранённых настроек — Москва.

paths:
  career_base_md: "./career_base.md"     # твоя карьерная база, см. career_base.example.md
  db: "./hh_helper.db"
  out_dir: "./out"

yandex:
  api_key_env: "YANDEX_API_KEY"   # скрипт читает ключ из переменной окружения, не из файла
  folder_id: "your-folder-id"      # id каталога в Yandex Cloud, см. console.cloud.yandex.ru
  scorer_model: "yandexgpt-lite/latest"   # дёшево и достаточно для оценки вакансий
  tailor_model: "yandexgpt/latest"        # для качественного текста резюме/письма

gigachat:
  # Опционально — второй LLM-провайдер (src/gigachat_client.py). Убери всю секцию,
  # если GigaChat не нужен вообще. credentials — Authorization key из личного
  # кабинета Sber Studio (https://developers.sber.ru/studio/), в .env.
  credentials_env: "GIGACHAT_CREDENTIALS"
  scope: "GIGACHAT_API_PERS"   # GIGACHAT_API_PERS | GIGACHAT_API_B2B | GIGACHAT_API_CORP
  scorer_model: "GigaChat-2"
  tailor_model: "GigaChat-2-Pro"

llm:
  # Провайдер по умолчанию для скоринга и генерации резюме/писем (src/llm_provider.py).
  # yandex | gigachat — второй нужен только если заполнишь секцию gigachat ниже.
  provider: "yandex"
  score_provider: null    # null = взять provider выше; можно переопределить отдельно для скоринга
  tailor_provider: null   # то же для tailor'а
  mode: "sync"            # sync | async — у Yandex оба реализованы; async полезен только
                          # для cron-пайплайна (fetch→score→digest), не для веб-запросов
  batch_scoring: false    # пакетный скоринг по N вакансий за запрос — экспериментально, выключено

digest:
  top_n: 15
  min_score_to_show: 55   # вакансии с оценкой ниже — не попадают в дайджест вообще

# Порог автоотсечения по score (auto_reject_max_score) настраивается в веб-интерфейсе —
# страница «Настройки», по умолчанию 40. В конфиге не задаётся.

webapp:
  host: "0.0.0.0"     # слушает на всех интерфейсах — доступ по IP сервера напрямую
  port: 8765
  # логин/пароль для страницы /login (сессионный логин); имена переменных, реальные
  # значения — в .env. Плюс WEBAPP_SECRET_KEY в .env — подписывает cookie сессии.
  login_user_env: "WEBAPP_USER"
  login_password_env: "WEBAPP_PASSWORD"
